<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>すうじ あと なんこ？</title>
<style>
  :root {
    --bg: #f7f7f7;
    --panel: #ffffff;
    --shadow: 0 8px 20px rgba(0,0,0,.10);
    --radius: 16px;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: system-ui, -apple-system, "Noto Sans JP", sans-serif;
    background: var(--bg);
    color: #111;
  }
  .wrap {
    max-width: 760px;
    margin: 0 auto;
    padding: 16px;
  }
  .panel {
    background: var(--panel);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 16px;
  }
  .topbar {
    display: flex;
    justify-content: flex-end;
    margin-bottom: 6px;
  }
  .title {
    font-weight: 950;
    font-size: 22px;
    margin: 0 0 14px;
    text-align: center;
  }

  .stage {
    display: grid;
    place-items: center;
    position: relative;
  }

  .card {
    background: #fff;
    border-radius: 14px;
    box-shadow: 0 6px 14px rgba(0,0,0,.08);
    padding: 12px;
    position: relative;
    aspect-ratio: 3 / 4;
    width: clamp(190px, 60vw, 360px);
    overflow: hidden;
  }

  .card::after {
    content: "";
    position: absolute;
    inset: 10px;
    border-radius: 12px;
    border: 3px solid rgba(0,0,0,.06);
    pointer-events: none;
    z-index: 3;
  }

  .cardInner {
    position: absolute;
    inset: 0;
    z-index: 1;
    transform: translateY(0) scale(1);
    opacity: 1;
    display: grid;
    place-items: center;
  }

  .numberFace {
    width: calc(100% - 24px);
    height: calc(100% - 24px);
    margin: 12px;
    display: grid;
    place-items: center;
    font-weight: 950;
    font-size: clamp(140px, 34vw, 230px);
    line-height: 1;
    color: #111;
    user-select: none;
  }

  .answer {
    position: absolute;
    left: 50%;
    top: -140px;
    transform: translateX(-50%);
    background: rgba(255, 255, 255, .92);
    border-radius: 999px;
    padding: 10px 18px;
    box-shadow: 0 10px 24px rgba(0,0,0,.18);
    font-weight: 950;
    font-size: clamp(44px, 10vw, 84px);
    line-height: 1;
    opacity: 0;
    transition: top .28s ease, opacity .20s ease;
    pointer-events: none;
    z-index: 5;
  }
  .answer.show {
    top: 22px;
    opacity: 1;
  }

  @keyframes dealOut {
    0%   { transform: translateY(0) scale(1); opacity: 1; filter: blur(0); }
    100% { transform: translateY(26px) scale(.98); opacity: 0; filter: blur(1px); }
  }
  @keyframes dealIn {
    0%   { transform: translateY(-26px) scale(.98); opacity: 0; filter: blur(1px); }
    100% { transform: translateY(0) scale(1); opacity: 1; filter: blur(0); }
  }
  .dealingOut .cardInner { animation: dealOut .22s ease forwards; }
  .dealingIn  .cardInner { animation: dealIn  .26s ease forwards; }

  .dealOverlay {
    position: absolute;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    z-index: 6;
    background: rgba(255,255,255,.15);
    backdrop-filter: blur(1px);
  }
  .dealOverlay.show { display: flex; }
  .pill {
    background: rgba(17,17,17,.82);
    color: #fff;
    border-radius: 999px;
    padding: 10px 16px;
    font-weight: 900;
    font-size: 15px;
    letter-spacing: .03em;
  }

  .controls {
    display: flex;
    justify-content: center;
    margin-top: 16px;
  }

  .mainBtn,
  .voiceBtn {
    border: 0;
    border-radius: 14px;
    font-weight: 950;
    cursor: pointer;
  }

  .mainBtn {
    padding: 14px 18px;
    font-size: 18px;
    background: #111;
    color: #fff;
    min-width: 170px;
  }
  .mainBtn:disabled {
    opacity: .55;
    cursor: not-allowed;
  }

  .voiceBtn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 14px;
    font-size: 15px;
    background: #f1f1f1;
    color: #111;
  }
  .voiceBtn.off {
    background: #e9e9e9;
    color: #666;
  }
  .voiceIcon {
    font-size: 18px;
    line-height: 1;
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="panel">
      <div class="topbar">
        <button id="voiceBtn" class="voiceBtn" type="button" aria-pressed="true" title="音声のオンオフ">
          <span id="voiceIcon" class="voiceIcon">🔊</span>
          <span id="voiceLabel">音声 ON</span>
        </button>
      </div>

      <p class="title">すうじ あと なんこ？</p>

      <div class="stage">
        <div class="card" id="card">
          <div class="answer" id="ans">5</div>
          <div class="cardInner" id="cardInner">
            <div id="numberFace" class="numberFace">5</div>
          </div>
          <div class="dealOverlay" id="dealOverlay">
            <div class="pill">つぎのカード…</div>
          </div>
        </div>
      </div>

      <div class="controls">
        <button id="btn" class="mainBtn" type="button">こたえ</button>
      </div>
    </div>
  </div>

<script>
let currentN = 5;
let mode = "show"; // "show" => answer, "next" => deal next

const STORAGE_KEY = "suuji_ato_nanko_voice_enabled";
const speechSupported = "speechSynthesis" in window && "SpeechSynthesisUtterance" in window;
let voiceEnabled = speechSupported && localStorage.getItem(STORAGE_KEY) !== "off";

let audioCtx = null;
function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}
function beep(freq=700, dur=0.06, type="triangle", vol=0.10) {
  try {
    ensureAudio();
    if (audioCtx.state === "suspended") audioCtx.resume();
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = type;
    o.frequency.value = freq;
    g.gain.value = 0.0001;
    o.connect(g);
    g.connect(audioCtx.destination);
    const t = audioCtx.currentTime;
    g.gain.setValueAtTime(0.0001, t);
    g.gain.linearRampToValueAtTime(vol, t + 0.01);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    o.start(t);
    o.stop(t + dur + 0.02);
  } catch(e) {}
}
function chime() {
  beep(880, 0.07, "sine", 0.10);
  setTimeout(() => beep(1320, 0.06, "sine", 0.08), 70);
}
function dealSfx() {
  beep(520, 0.05, "triangle", 0.09);
  setTimeout(() => beep(760, 0.05, "triangle", 0.07), 90);
}

function cancelSpeech() {
  if (!speechSupported) return;
  try {
    window.speechSynthesis.cancel();
  } catch(e) {}
}

function speakQuestion(n) {
  if (!speechSupported || !voiceEnabled) return;
  cancelSpeech();
  const uttr = new SpeechSynthesisUtterance(`${n}。あと いくつ？`);
  uttr.lang = "ja-JP";
  uttr.rate = 0.92;
  uttr.pitch = 1.0;
  uttr.volume = 1.0;
  try {
    window.speechSynthesis.speak(uttr);
  } catch(e) {}
}

const numberFace = document.getElementById("numberFace");
const ans = document.getElementById("ans");
const btn = document.getElementById("btn");
const card = document.getElementById("card");
const overlay = document.getElementById("dealOverlay");
const voiceBtn = document.getElementById("voiceBtn");
const voiceIcon = document.getElementById("voiceIcon");
const voiceLabel = document.getElementById("voiceLabel");

function updateVoiceButton() {
  if (!speechSupported) {
    voiceEnabled = false;
    voiceBtn.disabled = true;
    voiceBtn.classList.add("off");
    voiceBtn.setAttribute("aria-pressed", "false");
    voiceIcon.textContent = "🔇";
    voiceLabel.textContent = "音声なし";
    return;
  }
  voiceBtn.disabled = false;
  voiceBtn.classList.toggle("off", !voiceEnabled);
  voiceBtn.setAttribute("aria-pressed", voiceEnabled ? "true" : "false");
  voiceIcon.textContent = voiceEnabled ? "🔊" : "🔇";
  voiceLabel.textContent = voiceEnabled ? "音声 ON" : "音声 OFF";
}

function pickN() {
  return Math.floor(Math.random() * 9) + 1;
}

function setProblem(n) {
  currentN = n;
  numberFace.textContent = String(n);
  ans.classList.remove("show");
  ans.textContent = String(10 - n);
}

function wait(ms) {
  return new Promise(resolve => setTimeout(resolve, ms));
}

async function nextProblem() {
  btn.disabled = true;
  cancelSpeech();
  ans.classList.remove("show");
  ans.style.visibility = "hidden";
  overlay.classList.add("show");
  dealSfx();

  card.classList.remove("dealingIn");
  card.classList.add("dealingOut");
  await wait(230);

  setProblem(pickN());

  card.classList.remove("dealingOut");
  card.classList.add("dealingIn");
  await wait(280);

  overlay.classList.remove("show");
  ans.style.visibility = "visible";

  mode = "show";
  btn.textContent = "こたえ";
  btn.disabled = false;

  setTimeout(() => speakQuestion(currentN), 40);
}

function showAnswer() {
  cancelSpeech();
  chime();
  ans.style.visibility = "visible";
  ans.classList.add("show");
  mode = "next";
  btn.textContent = "つぎ";
}

btn.addEventListener("click", () => {
  ensureAudio();
  cancelSpeech();
  if (mode === "show") showAnswer();
  else nextProblem();
});

voiceBtn.addEventListener("click", () => {
  voiceEnabled = !voiceEnabled;
  localStorage.setItem(STORAGE_KEY, voiceEnabled ? "on" : "off");
  updateVoiceButton();
  cancelSpeech();
  if (voiceEnabled && mode === "show") {
    setTimeout(() => speakQuestion(currentN), 40);
  }
});

window.addEventListener("beforeunload", cancelSpeech);

document.addEventListener("visibilitychange", () => {
  if (document.hidden) cancelSpeech();
});

updateVoiceButton();
setProblem(pickN());
setTimeout(() => speakQuestion(currentN), 250);
</script>
</body>
</html>
